# Prefix & snappiness
set -g prefix C-o
unbind C-b
bind C-o send-prefix
# set -s escape-time 0

# Terminal & mouse
# set -g default-terminal "tmux-256color"
set -g default-terminal "xterm-256color"
set -g terminal-overrides ''
set -g xterm-keys on
set -g mouse on
setw -g mode-keys vi
set -g history-limit 10000

# Combine overrides in a single setting (don’t overwrite the first one)
#   - RGB: truecolor
#   - smcup/rmcup null: avoid alternate-screen shenanigans for scrollback
# set -g terminal-overrides ',xterm-256color:RGB,xterm*:smcup@:rmcup@'
# set -as terminal-overrides ',*:Tc'

# Create a new session
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
bind K confirm kill-sessio

# --- Status Bar ---
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-bg colour236
set -g status-fg white

# Left side
set -g status-left-length 40
set -g status-left '#[fg=green,bold]#S #[fg=white]| #[fg=cyan]#I:#P #[fg=white]| #[fg=yellow]#(whoami)'

# Right side
set -g status-right-length 120
set -g status-right '#[fg=colour245]#(date +"%a %b %d %H:%M") #[fg=white]| #[fg=cyan]#H'

# Window status style
setw -g window-status-current-format '#[bg=green,fg=black,bold] #I:#W #[default]'
setw -g window-status-format '#[fg=white] #I:#W #[default]'

